<!DOCTYPE html>
<html>
    <head>
        <title> New Tab </title>
    </head>
    <body >
        <marquee> No direction attribute </marquee>

        <marquee direction="down" style="background-color: pink " height="500px">
        Hello all! welcome to coding hub 
        </marquee>

        <marquee scrollamount="10" behavior="alternate" loop="3">
            <img src="sunset.jpg" width="150px" height="150px">
        </marquee>

        <marquee>
            <img src="sunset.jpg" width="150px" height="150px">
        </marquee>

    </body>
</html>
