<!DOCTYPE html>
<html>
<head>
    <title>new tab</title>
    <style>
        button,h1{
            border:none;
            background-color:white;
            text-decoration:underline ;
        }
        button:hover{
            border-radius: 5px;
            background-color: rgb(244, 240, 5);
            font-family: Arial, Helvetica, sans-serif;
            text-decoration: none;
        }
        img{
            opacity:0.5;
        }
        img:hover{
            opacity: 1;
        }
        a:hover{
            text-decoration: none;
        }
        a:link{
            color:blue;
        }
        a.visited{
            color:orange;
        }
        a:active{
            color:skyblue;
        }
    </style>
</head>
<body bgcolor="pink">
    <h1> iam h1 </h1>
    <button>click here</button>
    <a href="https://www.google.co.in/">Google</a>
    <a href="https://www.flipkart.com/">Flipkart</a>
    <img src="flower.jpg" width="150px" height="150px">

</body>

</html>
