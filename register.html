<!DOCTYPE html>
<html>
    <head>
        <title> New Window</title>
    </head>
    <body>
        <form>
            <h1 align="center"> REGISTER FORM</h1><br><br>
            First name<input type="text" required placeholder="abc"><br><br>
            Last name<input type="text" placeholder="xyz"><br><br>
            Email<input type="email" id="email" name="email" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$"><br><br>
            mobile no.<input type="tel" id="phone" name=" required size=10 pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}"><br><br>
            <p>Gender</p>
                    <input type="radio" name="Gender" >Male<br>
                    <input type="radio" name="Gender" >Female<br><br><br>
            Password<input type="password" id="pwd" name="pwd" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"title="Must contain at least one  number and one uppercase and lowercase letter, and at least 8 or more characters"><br><br>
            work experience<input type="number" min="0" max="5" title="enter the value between 0-5"><br><br>
            start date: <input type="date"><br><br>
            end date: <input type="date"><br><br>
            <p>languages known</p>
                    <input type="checkbox" name="lang" >English<br>
                    <input type="checkbox" name="lang" >telugu<br>
                    <input type="checkbox" name="lang" >hindi<br>
                    <input type="checkbox" name="lang" >kannada<br>
                    <input type="checkbox" name="lang" >tamil<br><br><br>
            upload your resume<input type="file" accept=".docx"><br><br>
            <input type="checkbox" required align="center">Accepting all the terms and conditions<br><br>
            <input type="register"><br>        

        </form>
    </body>
</html>
